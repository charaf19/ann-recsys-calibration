# IndexWise-Recsys — tiny structural test configuration.
# NOT for paper reproduction: reduced datasets and query counts, intended
# only for quickly exercising the pipeline plumbing on a laptop.
# The canonical paper run is configs/main_cpu.yml.

inherits: ../../configs/defaults.yml

datasets:
  - ml-1m

evaluation:
  queries_large: 200
  queries_ml1m: 200
  latency_queries: 100

hardware:
  cpu_only: true

statistics:
  bootstrap_iterations: 50   # structural test only; the paper value is 2000
