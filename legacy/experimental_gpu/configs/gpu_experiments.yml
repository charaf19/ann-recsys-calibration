# OPTIONAL GPU experiment configuration (IndexWise-Recsys).
# Consumed by src/run_gpu_experiments.py; CLI flags override.
#
# GPU experiments are exploratory extensions: they reuse CPU-trained
# embeddings and CPU-built indexes, clone supported indexes to GPU, and
# measure latency + agreement against CPU search. They are NOT part of the
# canonical reproducible CPU benchmark, are disabled by default, and write
# only under results/gpu_experiments/. Requires a faiss-gpu build (never
# install faiss-cpu and faiss-gpu in the same environment); see
# docs/gpu_experiment_protocol.md.

gpu_experiments:
  enabled: false             # must be enabled explicitly (or run the script directly)
  device_ids: [0]
  datasets:
    - ml-1m
  modalities:
    - u2i
    - i2i
  methods:                   # hnsw / flatpq are unsupported by FAISS GPU
    - flat
    - ivfflat
    - ivfpq
  weighting: bm25
  dim: 128
  topk: 100
  metric_topk: 10
  queries: 5000
  timed_queries: 1000
  # runtime params for IVF methods (ideally the CPU-calibrated values from
  # results/main/calibration/; these are fallbacks)
  nprobe: 16
  ef: 128
  calibration_targets:
    - 0.90
    - 0.95
    - 0.98
  allow_cpu_fallback: true   # false = hard-fail when FAISS GPU is unavailable
  seed: 42
  notes: "GPU experiments are exploratory and not part of the canonical CPU benchmark."
