# Embedding backbone sensitivity study (optional; NOT the main pipeline).
# Consumed by src/run_embedding_backbone_sensitivity.py; CLI flags override.
#
# Purpose: check whether the ANN method *ranking* (the paper's actionable
# conclusion) is stable when the SVD embedding backbone is swapped out.
# svd_bm25 is the reference backbone; ann_ranking_stability is the Spearman
# correlation of the method ranking (by NDCG@10, U2I) against it.

datasets: [ml-1m]            # keep small by default; extend explicitly
modalities: [u2i]
methods: [flat, hnsw, ivfflat, ivfpq, flatpq]

backbones:
  - svd_bm25                 # reference (main pipeline)
  - svd_tfidf
  - svd_none
  - bpr_matrix_factorization # pure NumPy, no extra dependencies
  - two_tower_mlp            # OPTIONAL: requires PyTorch (torch not in requirements)

dim: 128
queries: 2000
topk: 100
metric_topk: 10
budget_mb: 100
seed: 42

# neural backbone hyperparameters (deterministic given seed)
bpr:
  epochs: 10
  lr: 0.05
  reg: 0.002
  n_negatives: 1

two_tower:
  epochs: 5
  lr: 0.001
  hidden_dim: 256
  batch_size: 2048
