    - dim
    - method
    - seed
    - build_wall_time_sec
    - index_size_mb
    - rss_mb_after
    - calibration_target
    - target_reached
    - achieved_recall_vs_exact
    - latency_p50_ms
    - latency_p95_ms
    - quality_measured
  required_non_null:
    - build_wall_time_sec
    - index_size_mb
    - rss_mb_after
    - target_reached
    - achieved_recall_vs_exact
    - latency_p50_ms
    - latency_p95_ms
  require_values:
