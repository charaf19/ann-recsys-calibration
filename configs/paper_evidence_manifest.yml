# IndexWise-Recsys strict paper-evidence contract.
#
# Every evidence section declares whether it is critical to the revised
# paper or optional presentation output, plus the paper claim/section it
# supports.  src/validate_paper_evidence.py interprets this file; scientific
# grid values and expected counts are not duplicated in the validator.

contract_version: 3

scope:
  status: critical
  associated_paper_evidence:
    - CPU-only scope
  cpu_only: true
  forbidden_result_paths:
    - results/gpu_experiments
    - results/analyses/gpu_experiments
  forbidden_columns:
    - gpu_used
    - gpu_device
    - gpu_energy_joules

main:
  status: critical
  associated_paper_evidence:
    - Main quality and efficiency results
    - Larger-catalog generalization
    - U2I versus I2I comparison
  file: results/main/summary_main.csv
  run_config_file: results/main/run_config.json
  datasets: [ml-1m, ml-20m, goodbooks, amazon-books]
  modalities: [u2i, i2i]
  methods: [flat, hnsw, ivfflat, ivfpq, flatpq]
  weighting: bm25
  dim: 128
  seed: 42
  expected_rows: 40
  key: [dataset, weighting, dim, modality, method, seed]
  required_columns:
    - dataset
    - weighting
    - dim
    - modality
    - method
    - seed
    - queries
    - recall_at_k_mean
    - precision_at_k_mean
    - hr_at_k_mean
    - ndcg_at_k_mean
    - map_at_k_mean
    - mrr_at_k_mean
    - ann_recall_vs_exact_at_k_mean
    - recall_at_100_mean
    - ann_recall_vs_exact_at_100_mean
    - coverage_at_k
    - gini_exposure
    - long_tail_exposure
    - long_tail_uplift
    - latency_p50_ms
    - latency_p95_ms
  metric_columns_no_nulls:
    - recall_at_k_mean
    - precision_at_k_mean
    - hr_at_k_mean
    - ndcg_at_k_mean
    - map_at_k_mean
    - mrr_at_k_mean
    - ann_recall_vs_exact_at_k_mean
    - recall_at_100_mean
    - ann_recall_vs_exact_at_100_mean
    - coverage_at_k
    - gini_exposure
    - long_tail_exposure
    - long_tail_uplift
    - latency_p50_ms
    - latency_p95_ms
  run_config_must_match:
    weighting: bm25
    dim: 128
    seed: 42

calibration_sensitivity:
  status: critical
  associated_paper_evidence:
    - Calibration-sensitivity analysis
  file: results/analyses/calibration_sensitivity/calibration_sensitivity.csv
  datasets: [ml-1m, ml-20m, goodbooks, amazon-books]
  methods: [hnsw, ivfflat, ivfpq]
  targets: [0.90, 0.95, 0.98]
  weighting: bm25
  dim: 128
  seed: 42
  calibration_queries: 1000
  expected_rows: 36
  key: [dataset, weighting, dim, method, target_recall, seed]
  required_columns:
    - dataset
    - weighting
    - dim
    - method
    - target_recall
    - target_reached
    - param_name
    - calibrated_param_value
    - achieved_recall_vs_exact
    - latency_p50_ms
    - latency_p95_ms
    - n_calibration_queries
    - seed
  required_non_null:
    - target_reached
    - param_name
    - achieved_recall_vs_exact
    - latency_p50_ms
    - latency_p95_ms
    - n_calibration_queries

embedding_sensitivity:
  status: critical
  associated_paper_evidence:
    - Embedding-backbone sensitivity
  file: results/analyses/embedding_sensitivity/embedding_backbone_sensitivity_all.csv
  datasets: [ml-1m]
  modalities: [u2i]
  backbones:
    - svd_bm25
    - svd_tfidf
    - svd_none
    - bpr_matrix_factorization
  optional_backbones:
    - two_tower_mlp
  methods: [flat, hnsw, ivfflat, ivfpq, flatpq]
  dim: 128
  seed: 42
  expected_rows: 20
  key: [dataset, backbone, modality, method, dim, seed]
  required_columns:
    - dataset
    - backbone
    - modality
    - method
    - dim
    - seed
