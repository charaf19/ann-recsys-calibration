# The claim audit consumes validation_report.json, so requiring it during the
# same validation pass would be circular.  It is listed and validated when
# present, but its absence or staleness is optional and cannot change the
# critical validator exit status.
claim_support_audit:
  status: optional
  associated_paper_evidence:
    - Claim-to-evidence traceability table
  file: results/paper/tables/claim_support_audit.csv
  expected_rows: 9
  key: [claim_area]
  required_columns:
    - claim_area
    - claim_strength_allowed
    - required_validation_sections
    - evidence_supported
    - failing_checks
    - safe_interpretation
    - unsafe_interpretation_to_avoid
