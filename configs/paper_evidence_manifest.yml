  file: results/analyses/scale_stress/scale_stress_all.csv
  catalog_sizes: [10000, 50000, 100000, 500000, 1000000]
  dimensions: [64, 128, 256]
  methods: [flat, hnsw, ivfflat, ivfpq, flatpq]
  seed: 42
  expected_rows: 75
  key: [n_items, dim, method, seed]
  required_columns:
