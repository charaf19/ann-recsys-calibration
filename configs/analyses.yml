# IndexWise-Recsys — named secondary analyses (revised-paper protocol).
# Consumed by run_embedding_backbone_sensitivity.py, run_scale_stress.py,
# and ann_decision_framework.py; explicit CLI flags override.

inherits: defaults.yml

embedding_sensitivity:
  datasets:
    - ml-1m
  modalities:
    - u2i
  backbones:
    - svd_bm25              # reference backbone (main pipeline embedding)
    - svd_tfidf
    - svd_none
    - bpr_matrix_factorization  # pure NumPy, no extra dependencies
  optional_backbones:
    - two_tower_mlp         # requires PyTorch (requirements-optional.txt)
  methods:
    - flat
    - hnsw
    - ivfflat
    - ivfpq
    - flatpq
  queries: 10000
  # neural backbone hyperparameters (deterministic given the seed)
  bpr:
    epochs: 10
    lr: 0.05
    reg: 0.002
    n_negatives: 1
  two_tower:
    epochs: 5
    lr: 0.001
    hidden_dim: 256
    batch_size: 2048

scale_stress:
  catalog_sizes:
    - 10000
    - 50000
    - 100000
    - 500000
    - 1000000
  dimensions:
    - 128
  methods:
    - flat
    - hnsw
    - ivfflat
    - ivfpq
  calibration_target: 0.95
  quality_measured: false   # cost-only stress test; never a quality claim
  # synthetic vector generation (seeded Gaussian mixture)
  n_clusters: 64
  cluster_std: 0.3
  calibration_queries: 500
  timed_queries: 300

decision_framework:
  weights:
    quality_retention: 0.45
    latency: 0.30
    memory: 0.15
    long_tail_exposure: 0.10
  allow_flatpq_online: false
  # quality retention credit per effect-size magnitude of delta-NDCG vs Flat
  quality_retention_by_effect:
    negligible: 1.00
    small: 0.70
    medium: 0.30
    large: 0.00
  # operating constraints used for use-case labeling
  latency_budget_p95_ms: 20.0
  memory_budget_mb: 2048
  min_agreement_recall: 0.90
  method_roles:
    flat: exact_reference
    hnsw: online_candidate
