# Calibration sensitivity study configuration.
# Consumed by src/run_calibration_sensitivity.py; CLI flags override.

datasets: [ml-1m, ml-20m, goodbooks]
methods: [hnsw, ivfflat, ivfpq]   # flat/flatpq have no tunable runtime parameter
targets: [0.90, 0.95, 0.98]

weighting: bm25
dim: 128
topk: 100
calibration_queries: 1000
seed: 42

# ascending sweep grids for the calibrated runtime parameter
param_grids:
  hnsw:    [8, 16, 32, 64, 128, 256, 512]
  ivfflat: [1, 2, 4, 8, 16, 32, 64, 128, 256]
  ivfpq:   [1, 2, 4, 8, 16, 32, 64, 128, 256]
