# IndexWise-Recsys — canonical revised-paper experiment configuration.
# This is the COMPLETE paper run (all four datasets), not a quick test;
# for a fast structural check use tests/fixtures/test_tiny.yml instead.
# Consumed by src/run_revision_experiments.py and the downstream analysis
# scripts; explicit CLI flags override these values.

inherits: defaults.yml

datasets:
  - ml-1m
  - ml-20m
  - goodbooks
  - amazon-books

evaluation:
  queries_large: 10000    # eval queries for ml-20m / goodbooks / amazon-books
  queries_ml1m: full      # evaluate every eligible ml-1m user
  latency_queries: 2000

hardware:
  cpu_only: true
